<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Server Brazilian</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="index-page">
    
    <!-- Ornate Border Frame -->
    <div class="ornate-frame">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
    </div>

    <!-- Hero Section -->
    <div class="hero-container">
        
        <!-- Navigation -->
        <nav class="main-nav">
            <a href="index.html" class="nav-link active">INÍCIO</a>
            <a href="sumario-livros.html" class="nav-link">LIVROS</a>
            <a href="sobre.html" class="nav-link">SOBRE</a>
        </nav>

        <!-- Main Content -->
        <div class="hero-content">
            
            <!-- Ornate Top Flourish -->
            <div class="flourish-top">
                <svg viewBox="0 0 200 40" class="flourish-svg">
                    <path d="M10,20 Q50,5 100,20 T190,20" stroke="currentColor" fill="none" stroke-width="0.5"/>
                    <circle cx="100" cy="20" r="3" fill="currentColor"/>
                </svg>
            </div>

            <!-- Title -->
            <h1 class="main-title">
                <span class="title-article">O</span>
                <span class="title-main">SERVER</span>
                <span class="title-subtitle">BRAZILIAN</span>
            </h1>

            <!-- Cover Image Container -->
            <div class="cover-container">
                <div class="cover-glow"></div>
                <img src="based_image.png" alt="O Server Brazilian" class="cover-image">
            </div>

            <!-- Tagline -->
            <div class="tagline">
                <p class="tagline-text">
                    Uma crônica filosófica sobre guerra, estratégia<br>
                    e a natureza da vitória
                </p>
            </div>

            <!-- Ornate Bottom Flourish -->
            <div class="flourish-bottom">
                <svg viewBox="0 0 200 40" class="flourish-svg">
                    <path d="M10,20 Q50,35 100,20 T190,20" stroke="currentColor" fill="none" stroke-width="0.5"/>
                    <circle cx="100" cy="20" r="3" fill="currentColor"/>
                </svg>
            </div>

            <!-- CTA Button -->
            <a href="sumario-livros.html" class="cta-button">
                <span class="button-text">INICIAR LEITURA</span>
                <span class="button-ornament">✦</span>
            </a>

        </div>

        <!-- Footer -->
        <footer class="hero-footer">
            <div class="footer-ornament">✦ ✦ ✦</div>
            <p class="footer-text">MMXXVI — Uma obra de filosofia estratégica</p>
        </footer>

    </div>
